spring:
  profiles:
    active: dev
  application:
    name: ExpenseFlow
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    time-zone: UTC

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Actuator Config
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

# OpenAPI Config
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

# Application Security Config
app:
  security:
    jwt:
      secret: ${JWT_SECRET:9a763847f6c3d9e2a87b32c610e20f482d91bc86107384a275463f28d8b92d7e}
      access-token-expiry-minutes: 15
      refresh-token-expiry-days: 7
    password:
      min-length: 8
      max-length: 128
      history-size: 5
    login:
      max-failed-attempts: 5
      decay-interval-minutes: 30
    session:
      idle-timeout-minutes: 30
      absolute-timeout-hours: 8
    tokens:
      verification-expiry-hours: 24
      reset-expiry-minutes: 15
    lock:
      durations:
        - 30
        - 120
        - 720
        - 1440
